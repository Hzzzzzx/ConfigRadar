services:
  app:
    image: config-radar-demo
    entrypoint:
      - java
      - -Dcompose.jvm.mode=prod
    command:
      - --compose.cli.mode=worker
      - --compose.cli.limit=5
    environment:
      COMPOSE_APP_MODE: prod
      COMPOSE_FEATURE_ENABLED: true
  worker:
    image: config-radar-worker
    environment:
      - COMPOSE_WORKER_THREADS=4
      - COMPOSE_LOG_LEVEL=debug
